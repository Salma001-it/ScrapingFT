name: Update Hugging Face Dataset

# Quando far partire il workflow
on:
  schedule:
    - cron: "0 6 * * *"   # ogni giorno alle 6:00 UTC
  workflow_dispatch:      # permette di lanciare manualmente

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      # 1. Prendi il codice dal repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setta Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Installa le dipendenze
      - name: Install dependencies
        run: |
          pip install selenium pandas datasets huggingface_hub

      # 4. Lancia il tuo script
      - name: Run scraper
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # usa il secret del token
        run: |
          python scrapingft.py
